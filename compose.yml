services:
  url_cleanse_bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: url_cleanse_bot
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./bot.db:/app/bot.db
    env_file:
      - .env
    environment:
      - APP_ENV=production
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
