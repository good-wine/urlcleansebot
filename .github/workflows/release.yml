# ──────────────────────────────────────────────────────────────
# Release workflow
# Triggered when a tag matching "v*" is pushed (e.g. v0.3.0)
# 1. Builds binaries for Linux (x86_64 + aarch64), macOS, Windows
# 2. Creates a GitHub Release with changelog
# 3. Uploads binaries with SHA256 checksums
# ──────────────────────────────────────────────────────────────
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Semver check ───────────────────────────────────────────
  semver-check:
    name: SemVer Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.88"
      - uses: taiki-e/install-action@ace6ebe54a6a0c86dfb5f7764b17f793b6925bc3 # v2
        with:
          tool: cargo-semver-checks
      - run: cargo semver-checks check-release

  # ── Build matrix (one job per target) ──────────────────────
  build:
    name: Build (${{ matrix.target }})
    needs: [semver-check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            suffix: ""
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            suffix: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: ".exe"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.88"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Prepare artifacts
        shell: bash
        run: |
          BINARY="target/${{ matrix.target }}/release/url_cleanse_bot${{ matrix.suffix }}"
          PKG="url_cleanse_bot-${{ matrix.target }}${{ matrix.suffix }}"
          cp "$BINARY" "$PKG"
          sha256sum "$PKG" > "$PKG.sha256"
          echo "package=$PKG" >> $GITHUB_ENV

      - name: Upload binary artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: url_cleanse_bot-${{ matrix.target }}
          path: |
            url_cleanse_bot-${{ matrix.target }}*
          if-no-files-found: error

  # ── GitHub Release ─────────────────────────────────────────
  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Extract changelog for this version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]") > 0 || index($0, "[" ver " ") > 0) found=1
              next
            }
            /^## \[/ && found { exit }
            found { print }
          ' CHANGELOG.md > release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: artifacts/**/*
          generate_release_notes: false
