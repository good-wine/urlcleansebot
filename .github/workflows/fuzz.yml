# ──────────────────────────────────────────────────────────────
# Fuzz testing
# Runs cargo-fuzz targets on schedule and on relevant changes
# URL parsing is security-critical, so we fuzz it continuously
# ──────────────────────────────────────────────────────────────
name: Fuzz

on:
  push:
    branches: [main]
    paths:
      - "src/**/*.rs"
      - "fuzz/**"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    branches: [main]
    paths:
      - "src/**/*.rs"
      - "fuzz/**"
      - "Cargo.toml"
      - "Cargo.lock"
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.88"

      - uses: taiki-e/install-action@ace6ebe54a6a0c86dfb5f7764b17f793b6925bc3 # v2
        with:
          tool: cargo-fuzz

      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          key: fuzz

      - name: Build fuzz targets
        run: cargo fuzz build

      - name: Run fuzz targets (short)
        run: |
          for target in $(cargo fuzz list 2>/dev/null); do
            echo "=== Fuzzing target: $target ==="
            cargo fuzz run "$target" -- -max_total_time=60
          done
