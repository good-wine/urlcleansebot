# ──────────────────────────────────────────────────────────────
# Stale issue & PR manager
# Marks issues/PRs as stale after 60 days of inactivity
# Closes them after 7 additional days of inactivity
# Exempts security, enhancement, and bug labels
# ──────────────────────────────────────────────────────────────
name: Stale

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close stale issues & PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-issue-stale: 60
          days-before-issue-close: 7
          days-before-pr-stale: 60
          days-before-pr-close: 7
          exempt-issue-labels: security,enhancement,bug
          exempt-pr-labels: security,enhancement,bug
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed in 7 days if no further activity occurs.
          stale-pr-message: >
            This PR has been automatically marked as stale because it has not had
            recent activity. It will be closed in 7 days if no further activity occurs.
          close-issue-message: >
            This issue has been automatically closed due to inactivity.
          close-pr-message: >
            This PR has been automatically closed due to inactivity.
